<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>What's Up Dog? — Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#FDF8F3;--surface:#FFFFFF;--accent:#C4611A;--accent-soft:#FFF3E8;
  --ink:#1C0F04;--ink-mid:#6B4C35;--ink-light:#AE8E74;--border:#EAD9C8;
  --green:#1E7A4A;--green-soft:#D6F0E2;--red:#A83030;--red-soft:#FFE8E8;
}
body{background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--ink);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.serif{font-family:'Playfair Display',serif}
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:36px;width:100%;max-width:400px}
.btn{font-family:'DM Sans',sans-serif;font-weight:600;font-size:14px;border-radius:9px;padding:11px 22px;cursor:pointer;border:none;transition:all .15s;display:inline-flex;align-items:center;justify-content:center;gap:8px;width:100%}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover:not(:disabled){background:#A8510F}
.btn-primary:disabled{background:#D4AE94;cursor:not-allowed}
.btn-ghost{background:transparent;color:var(--ink-mid);border:none;font-size:13px;cursor:pointer;padding:6px;text-decoration:underline;text-underline-offset:3px}
.btn-ghost:hover{color:var(--accent)}
label{font-size:11px;font-weight:700;color:var(--ink-mid);display:block;margin-bottom:6px;text-transform:uppercase;letter-spacing:.05em}
input[type=email],input[type=password]{font-family:'DM Sans',sans-serif;width:100%;border:1.5px solid var(--border);border-radius:8px;padding:10px 13px;font-size:14px;outline:none;color:var(--ink);background:#fff;transition:border-color .15s}
input:focus{border-color:var(--accent)}
.form-group{margin-bottom:16px}
.error-msg{background:var(--red-soft);border:1px solid #F0BEBE;border-radius:8px;padding:10px 14px;font-size:13px;color:var(--red);margin-bottom:16px;display:none}
.success-msg{background:var(--green-soft);border:1px solid #A0D8BC;border-radius:8px;padding:10px 14px;font-size:13px;color:var(--green);margin-bottom:16px;display:none}
.spin{display:inline-block;width:16px;height:16px;border:2.5px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .75s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#reset-view{display:none}
</style>
</head>
<body>

<div class="card">
  <div style="text-align:center;margin-bottom:28px">
    <div style="font-size:36px;margin-bottom:10px">🐾</div>
    <div class="serif" style="font-size:26px;margin-bottom:4px">What's Up Dog?</div>
    <div style="font-size:12px;color:var(--ink-light);font-weight:600;letter-spacing:.05em;text-transform:uppercase">Daily Reporter</div>
  </div>

  <!-- LOGIN VIEW -->
  <div id="login-view">
    <div class="error-msg" id="login-error"></div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="login-email" placeholder="you@example.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password"
             onkeydown="if(event.key==='Enter')signIn()">
    </div>
    <button class="btn btn-primary" id="login-btn" onclick="signIn()">Sign In</button>
    <div style="text-align:center;margin-top:14px">
      <button class="btn-ghost" onclick="showReset()">Forgot password?</button>
    </div>
  </div>

  <!-- PASSWORD RESET VIEW -->
  <div id="reset-view">
    <div style="font-size:13px;color:var(--ink-mid);margin-bottom:16px">
      Enter your email and we'll send you a reset link.
    </div>
    <div class="error-msg" id="reset-error"></div>
    <div class="success-msg" id="reset-success"></div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="reset-email" placeholder="you@example.com">
    </div>
    <button class="btn btn-primary" id="reset-btn" onclick="sendReset()">Send Reset Link</button>
    <div style="text-align:center;margin-top:14px">
      <button class="btn-ghost" onclick="showLogin()">← Back to sign in</button>
    </div>
  </div>

  <!-- SET PASSWORD VIEW — shown when arriving via invite or recovery link -->
  <div id="set-password-view" style="display:none">
    <div style="font-size:13px;color:var(--ink-mid);margin-bottom:16px" id="set-password-intro">
      Welcome! Choose a password to complete your account setup.
    </div>
    <div class="error-msg" id="set-password-error"></div>
    <div class="form-group">
      <label>New Password</label>
      <input type="password" id="new-password" placeholder="At least 8 characters"
             onkeydown="if(event.key==='Enter')setPassword()">
    </div>
    <div class="form-group">
      <label>Confirm Password</label>
      <input type="password" id="confirm-password" placeholder="Repeat your password"
             onkeydown="if(event.key==='Enter')setPassword()">
    </div>
    <button class="btn btn-primary" id="set-password-btn" onclick="setPassword()">Set Password & Sign In</button>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://pwltfmhzxzxvlgsrkslb.supabase.co';
const SUPABASE_KEY = 'sb_publishable_3WX7ZNSlWZqH1PwsxppTxA_QUreNyVp';
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_KEY, {
  auth: { redirectTo: window.location.origin + '/login.html' }
});

// Detect invite or password recovery tokens in the URL hash
window.onload = async () => {
  const hash   = window.location.hash;
  const params = new URLSearchParams(hash.replace('#', '?'));
  const type   = params.get('type');

  // Invite or recovery link — show set-password form
  if (type === 'invite' || type === 'recovery') {
    // Supabase has already exchanged the token for a session by this point
    const { data: { session } } = await sb.auth.getSession();
    if (session) {
      const intro = document.getElementById('set-password-intro');
      if (type === 'recovery') intro.textContent = 'Enter a new password for your account.';
      showSetPassword();
      return;
    }
  }

  // Normal load — if already logged in, redirect by role
  const { data: { session } } = await sb.auth.getSession();
  if (session) await redirectByRole(session.user.id);
};

async function signIn() {
  const email    = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  const btn      = document.getElementById('login-btn');
  const errEl    = document.getElementById('login-error');
  errEl.style.display = 'none';

  if (!email || !password) {
    errEl.textContent   = 'Please enter your email and password.';
    errEl.style.display = 'block';
    return;
  }

  btn.disabled   = true;
  btn.innerHTML  = '<span class="spin"></span>';

  const { data, error } = await sb.auth.signInWithPassword({ email, password });

  if (error) {
    errEl.textContent   = error.message || 'Sign in failed. Check your email and password.';
    errEl.style.display = 'block';
    btn.disabled        = false;
    btn.textContent     = 'Sign In';
    return;
  }

  await redirectByRole(data.user.id);
}

async function redirectByRole(userId) {
  const { data: profile } = await sb
    .from('profiles')
    .select('role')
    .eq('id', userId)
    .single();

  if (profile?.role === 'admin') {
    window.location.href = 'admin.html';
  } else {
    window.location.href = 'index.html';
  }
}

async function sendReset() {
  const email  = document.getElementById('reset-email').value.trim();
  const btn    = document.getElementById('reset-btn');
  const errEl  = document.getElementById('reset-error');
  const succEl = document.getElementById('reset-success');
  errEl.style.display  = 'none';
  succEl.style.display = 'none';

  if (!email) {
    errEl.textContent   = 'Please enter your email.';
    errEl.style.display = 'block';
    return;
  }

  btn.disabled   = true;
  btn.innerHTML  = '<span class="spin"></span>';

  const { error } = await sb.auth.resetPasswordForEmail(email, {
    redirectTo: window.location.origin + '/login.html',
  });

  if (error) {
    errEl.textContent   = error.message;
    errEl.style.display = 'block';
  } else {
    succEl.textContent   = 'Reset link sent — check your email.';
    succEl.style.display = 'block';
  }

  btn.disabled  = false;
  btn.textContent = 'Send Reset Link';
}

async function setPassword() {
  const password  = document.getElementById('new-password').value;
  const confirm   = document.getElementById('confirm-password').value;
  const btn       = document.getElementById('set-password-btn');
  const errEl     = document.getElementById('set-password-error');
  errEl.style.display = 'none';

  if (password.length < 8) {
    errEl.textContent   = 'Password must be at least 8 characters.';
    errEl.style.display = 'block';
    return;
  }
  if (password !== confirm) {
    errEl.textContent   = 'Passwords don\'t match.';
    errEl.style.display = 'block';
    return;
  }

  btn.disabled  = true;
  btn.innerHTML = '<span class="spin"></span>';

  const { data, error } = await sb.auth.updateUser({ password });

  if (error) {
    errEl.textContent   = error.message;
    errEl.style.display = 'block';
    btn.disabled        = false;
    btn.textContent     = 'Set Password & Sign In';
    return;
  }

  // Password set — redirect by role
  await redirectByRole(data.user.id);
}

function showSetPassword() {
  document.getElementById('login-view').style.display        = 'none';
  document.getElementById('reset-view').style.display        = 'none';
  document.getElementById('set-password-view').style.display = 'block';
}

function showReset() {
  document.getElementById('login-view').style.display = 'none';
  document.getElementById('reset-view').style.display = 'block';
}
function showLogin() {
  document.getElementById('reset-view').style.display = 'none';
  document.getElementById('login-view').style.display = 'block';
}
</script>
</body>
</html>
